<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>看看大家 · 教师端</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      padding: 40px 24px;
    }
    header {
      max-width: 680px;
      margin: 0 auto 32px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    header h1 { font-size: 34px; font-weight: 700; color: #1c1c1e; }
    header .subtitle { font-size: 15px; color: #8e8e93; margin-top: 4px; }
    .btn-reset {
      padding: 10px 20px;
      background: #ff3b30;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-reset:active { opacity: 0.75; }
    .progress-card {
      max-width: 680px;
      margin: 0 auto 24px;
      background: white;
      border-radius: 20px;
      padding: 28px 32px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.07);
    }
    .big-number { font-size: 72px; font-weight: 700; line-height: 1; color: #1c1c1e; }
    .big-number span { color: #007aff; }
    .progress-bar-wrap { margin-top: 16px; background: #e5e5ea; border-radius: 8px; height: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: #34c759; border-radius: 8px; transition: width 0.4s ease; }
    .progress-label { margin-top: 8px; font-size: 14px; color: #8e8e93; }
    .list-card {
      max-width: 680px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 24px 32px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.07);
    }
    .list-card h2 { font-size: 13px; font-weight: 600; color: #8e8e93; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
    .user-list { display: flex; flex-wrap: wrap; gap: 10px; }
    .user-chip { padding: 8px 16px; border-radius: 20px; font-size: 15px; font-weight: 500; }
    .user-chip.done { background: #d1f5d3; color: #1a7a2e; }
    .user-chip.pending { background: #f2f2f7; color: #8e8e93; }
    .empty { color: #c7c7cc; font-size: 15px; padding: 8px 0; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #34c759; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .live-label { font-size: 13px; color: #34c759; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>看看大家</h1>
      <p class="subtitle"><span class="status-dot"></span><span class="live-label">实时同步中</span></p>
    </div>
    <button class="btn-reset" onclick="resetSession()">新一轮 ↺</button>
  </header>

  <div class="progress-card">
    <div class="big-number"><span id="doneCount">0</span> / <span id="totalCount">0</span></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <p class="progress-label" id="progressLabel">暂无人加入</p>
  </div>

  <div class="list-card">
    <h2>完成情况</h2>
    <div class="user-list" id="userList">
      <p class="empty">等待学生加入…</p>
    </div>
  </div>

  <script>
    const DB = "https://kankandajia-beae8-default-rtdb.firebaseio.com";
    let sessionKey = null;

    async function fbGet(path) {
      const r = await fetch(`${DB}/${path}.json`);
      return r.json();
    }

    async function fbSet(path, data) {
      await fetch(`${DB}/${path}.json`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
    }

    async function init() {
      let key = localStorage.getItem("teacher_session");
      if (!key) {
        key = "s" + Date.now().toString(36);
        localStorage.setItem("teacher_session", key);
      }
      sessionKey = key;
      await fbSet("current_session", key);
      poll();
      setInterval(poll, 2000);
    }

    async function poll() {
      const data = await fbGet(`sessions/${sessionKey}/users`);
      const users = data ? Object.values(data) : [];
      const done = users.filter(u => u.done);
      const total = users.length;
      const doneCount = done.length;

      document.getElementById("doneCount").textContent = doneCount;
      document.getElementById("totalCount").textContent = total;
      const pct = total > 0 ? Math.round(doneCount / total * 100) : 0;
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("progressLabel").textContent =
        total === 0 ? "暂无人加入" :
        doneCount === total ? "🎉 全部完成！" :
        `${pct}% 完成，还有 ${total - doneCount} 人未完成`;

      const list = document.getElementById("userList");
      if (total === 0) {
        list.innerHTML = '<p class="empty">等待学生加入…</p>';
        return;
      }
      const pending = users.filter(u => !u.done);
      list.innerHTML = [
        ...done.map(u => `<span class="user-chip done">✅ ${u.name}</span>`),
        ...pending.map(u => `<span class="user-chip pending">${u.name}</span>`)
      ].join("");
    }

    async function resetSession() {
      if (!confirm("开始新一轮？所有完成状态将清零。")) return;
      const key = "s" + Date.now().toString(36);
      localStorage.setItem("teacher_session", key);
      sessionKey = key;
      await fbSet("current_session", key);
      document.getElementById("doneCount").textContent = "0";
      document.getElementById("totalCount").textContent = "0";
      document.getElementById("progressFill").style.width = "0%";
      document.getElementById("progressLabel").textContent = "暂无人加入";
      document.getElementById("userList").innerHTML = '<p class="empty">等待学生加入…</p>';
    }

    init();
  </script>
</body>
</html>
