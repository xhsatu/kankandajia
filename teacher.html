<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>看看大家 · 教师端</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c11;
      --surface: #13141b;
      --surface2: #1c1e28;
      --border: rgba(255,255,255,0.06);
      --accent: #5b8cff;
      --green: #2dce72;
      --green-dim: rgba(45,206,114,0.15);
      --red: #ff5f5f;
      --text: #eef0f6;
      --muted: rgba(238,240,246,0.4);
      --muted2: rgba(238,240,246,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 40px 28px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 80% 10%, rgba(91,140,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 400px 300px at 10% 90%, rgba(45,206,114,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 700px; margin: 0 auto; position: relative; z-index: 1; }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 36px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header h1 {
      font-size: 36px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(45,206,114,0.4); }
      50%       { opacity: 0.7; box-shadow: 0 0 0 5px rgba(45,206,114,0); }
    }
    .live-text {
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    #sessionLabel {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted2);
      margin-left: 4px;
    }

    .btn-reset {
      padding: 10px 18px;
      background: transparent;
      border: 1px solid rgba(255,95,95,0.35);
      color: var(--red);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      white-space: nowrap;
    }
    .btn-reset:hover {
      background: rgba(255,95,95,0.1);
      border-color: rgba(255,95,95,0.6);
    }
    .btn-reset:active { transform: scale(0.96); }

    /* ── PROGRESS CARD ── */
    .progress-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 40px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      animation: fadeUp 0.4s 0.08s ease both;
    }

    .numbers-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 20px;
    }
    .big-num {
      font-family: 'DM Mono', monospace;
      font-size: 80px;
      font-weight: 500;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -2px;
      transition: color 0.3s;
    }
    .big-num.all-done { color: var(--green); }
    .divider { font-size: 48px; font-weight: 300; color: var(--muted2); line-height: 1; }
    .total-num {
      font-family: 'DM Mono', monospace;
      font-size: 80px;
      font-weight: 500;
      line-height: 1;
      color: var(--muted);
      letter-spacing: -2px;
    }

    /* Progress bar */
    .bar-wrap {
      background: var(--surface2);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .progress-label {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── LIST CARD ── */
    .list-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 36px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      animation: fadeUp 0.4s 0.16s ease both;
    }

    .list-header {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .user-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .user-chip {
      padding: 7px 14px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid transparent;
      transition: transform 0.15s;
      animation: chipIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    .user-chip:hover { transform: scale(1.04); }

    .user-chip.done {
      background: var(--green-dim);
      border-color: rgba(45,206,114,0.25);
      color: #6ef0a8;
    }
    .user-chip.pending {
      background: var(--surface2);
      border-color: var(--border);
      color: var(--muted);
    }

    .empty {
      color: var(--muted2);
      font-size: 14px;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>看看大家</h1>
        <div class="live-badge">
          <span class="status-dot"></span>
          <span class="live-text">实时同步</span>
          <span id="sessionLabel"></span>
        </div>
      </div>
      <button class="btn-reset" onclick="resetSession()">新一轮 ↺</button>
    </header>

    <div class="progress-card">
      <div class="numbers-row">
        <span class="big-num" id="doneCount">0</span>
        <span class="divider">/</span>
        <span class="total-num" id="totalCount">0</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <p class="progress-label" id="progressLabel">暂无人加入</p>
    </div>

    <div class="list-card">
      <p class="list-header">完成情况</p>
      <div class="user-list" id="userList">
        <p class="empty">等待学生加入…</p>
      </div>
    </div>
  </div>

  <script>
    const DB = "https://kankandajia-beae8-default-rtdb.firebaseio.com";
    let sessionKey = null;

    async function fbGet(path) {
      const r = await fetch(`${DB}/${path}.json`);
      return r.json();
    }

    async function fbSet(path, data) {
      await fetch(`${DB}/${path}.json`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
    }

    async function init() {
      const key = "s" + Date.now().toString(36);
      sessionKey = key;
      await fbSet("current_session", key);
      poll();
      setInterval(poll, 2000);
    }

    async function poll() {
      const data = await fbGet(`sessions/${sessionKey}/users`);
      const users = data ? Object.values(data) : [];
      const done = users.filter(u => u.done);
      const total = users.length;
      const doneCount = done.length;

      document.getElementById("sessionLabel").textContent = sessionKey;

      const doneEl = document.getElementById("doneCount");
      doneEl.textContent = doneCount;
      doneEl.className = "big-num" + (total > 0 && doneCount === total ? " all-done" : "");

      document.getElementById("totalCount").textContent = total;
      const pct = total > 0 ? Math.round(doneCount / total * 100) : 0;
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("progressLabel").textContent =
        total === 0 ? "暂无人加入" :
        doneCount === total ? "🎉 全部完成！" :
        `${pct}% · 还有 ${total - doneCount} 人未完成`;

      const list = document.getElementById("userList");
      if (total === 0) {
        list.innerHTML = '<p class="empty">等待学生加入…</p>';
        return;
      }
      const pending = users.filter(u => !u.done);
      list.innerHTML = [
        ...done.map(u => `<span class="user-chip done">✓ ${u.name}</span>`),
        ...pending.map(u => `<span class="user-chip pending">${u.name}</span>`)
      ].join("");
    }

    async function resetSession() {
      if (!confirm("开始新一轮？所有完成状态将清零。")) return;
      const key = "s" + Date.now().toString(36);
      localStorage.setItem("teacher_session", key);
      sessionKey = key;
      await fbSet("current_session", key);
      poll();
    }

    init();
  </script>
</body>
</html>
