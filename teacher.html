<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>看看大家</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111113;
      --surface: #1a1a1d;
      --border: rgba(255,255,255,0.08);
      --text: #f5f5f7;
      --sub: rgba(245,245,247,0.38);
      --sub2: rgba(245,245,247,0.14);
      --green: #34d170;
      --green-bg: rgba(52,209,112,0.08);
      --green-border: rgba(52,209,112,0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Instrument Sans', -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 48px 32px 80px;
    }

    .container { max-width: 660px; margin: 0 auto; }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
    }

    .header-left h1 {
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.4px;
    }

    .live-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .live-label {
      font-size: 12px;
      color: var(--green);
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    #sessionLabel {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--sub2);
    }

    .btn-reset {
      padding: 9px 16px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--sub);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-reset:hover { border-color: rgba(245,245,247,0.2); color: var(--text); }
    .btn-reset:active { opacity: 0.7; }

    /* ── SCORE ── */
    .score-block {
      margin-bottom: 40px;
    }

    .score-nums {
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-bottom: 16px;
    }
    .num-done {
      font-family: 'DM Mono', monospace;
      font-size: 88px;
      font-weight: 500;
      line-height: 1;
      color: var(--text);
      letter-spacing: -3px;
      transition: color 0.4s;
    }
    .num-done.complete { color: var(--green); }
    .num-sep {
      font-family: 'DM Mono', monospace;
      font-size: 44px;
      font-weight: 400;
      color: var(--sub2);
      line-height: 1;
      padding: 0 2px;
    }
    .num-total {
      font-family: 'DM Mono', monospace;
      font-size: 88px;
      font-weight: 500;
      line-height: 1;
      color: var(--sub2);
      letter-spacing: -3px;
    }

    .bar-track {
      height: 2px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .progress-label {
      font-size: 13px;
      color: var(--sub);
    }

    /* ── LIST ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--sub2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .user-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .user-chip {
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid transparent;
      animation: chipIn 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }
    .user-chip.done {
      background: var(--green-bg);
      border-color: var(--green-border);
      color: var(--green);
    }
    .user-chip.pending {
      background: var(--surface);
      border-color: var(--border);
      color: var(--sub);
    }
    .empty {
      font-size: 13px;
      color: var(--sub2);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>看看大家</h1>
        <div class="live-row">
          <span class="dot"></span>
          <span class="live-label">实时同步中</span>
          <span id="sessionLabel"></span>
        </div>
      </div>
      <button class="btn-reset" onclick="resetSession()">新一轮 ↺</button>
    </header>

    <div class="score-block">
      <div class="score-nums">
        <span class="num-done" id="doneCount">0</span>
        <span class="num-sep">/</span>
        <span class="num-total" id="totalCount">0</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <p class="progress-label" id="progressLabel">暂无人加入</p>
    </div>

    <p class="section-label">完成情况</p>
    <div class="user-list" id="userList">
      <p class="empty">等待学生加入…</p>
    </div>
  </div>

  <script>
    const DB = "https://kankandajia-beae8-default-rtdb.firebaseio.com";
    let sessionKey = null;

    async function fbGet(path) {
      const r = await fetch(`${DB}/${path}.json`);
      return r.json();
    }
    async function fbSet(path, data) {
      await fetch(`${DB}/${path}.json`, {
        method: "PUT", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
    }

    async function init() {
      const key = "s" + Date.now().toString(36);
      sessionKey = key;
      await fbSet("current_session", key);
      poll();
      setInterval(poll, 2000);
    }

    async function poll() {
      const data = await fbGet(`sessions/${sessionKey}/users`);
      const users = data ? Object.values(data) : [];
      const done = users.filter(u => u.done);
      const total = users.length;
      const doneCount = done.length;

      document.getElementById("sessionLabel").textContent = sessionKey;

      const doneEl = document.getElementById("doneCount");
      doneEl.textContent = doneCount;
      doneEl.className = "num-done" + (total > 0 && doneCount === total ? " complete" : "");

      document.getElementById("totalCount").textContent = total;
      const pct = total > 0 ? Math.round(doneCount / total * 100) : 0;
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("progressLabel").textContent =
        total === 0 ? "暂无人加入" :
        doneCount === total ? "全部完成" :
        `${doneCount} 人完成，${total - doneCount} 人未完成`;

      const list = document.getElementById("userList");
      if (total === 0) {
        list.innerHTML = '<p class="empty">等待学生加入…</p>';
        return;
      }
      const pending = users.filter(u => !u.done);
      list.innerHTML = [
        ...done.map(u => `<span class="user-chip done">${u.name}</span>`),
        ...pending.map(u => `<span class="user-chip pending">${u.name}</span>`)
      ].join("");
    }

    async function resetSession() {
      if (!confirm("开始新一轮？所有完成状态将清零。")) return;
      const key = "s" + Date.now().toString(36);
      localStorage.setItem("teacher_session", key);
      sessionKey = key;
      await fbSet("current_session", key);
      poll();
    }

    init();
  </script>
</body>
</html>
