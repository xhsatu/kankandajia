<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我做完了</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 340px;
      text-align: center;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }
    .name-section h2 { font-size: 22px; font-weight: 600; color: #1c1c1e; margin-bottom: 8px; }
    .name-section p { font-size: 15px; color: #8e8e93; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e5e5ea;
      border-radius: 12px;
      font-size: 17px;
      outline: none;
      transition: border-color 0.2s;
      color: #1c1c1e;
    }
    input:focus { border-color: #007aff; }
    .btn-confirm {
      margin-top: 16px;
      width: 100%;
      padding: 15px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-confirm:active { opacity: 0.75; }
    .done-section { display: none; }
    .done-section .greeting { font-size: 17px; color: #8e8e93; margin-bottom: 32px; }
    .done-section .greeting span { color: #1c1c1e; font-weight: 600; }
    .btn-done {
      width: 180px; height: 180px; border-radius: 50%; border: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; margin: 0 auto;
    }
    .btn-done.idle { background: #007aff; color: white; box-shadow: 0 8px 30px rgba(0,122,255,0.35); }
    .btn-done.idle:active { transform: scale(0.95); }
    .btn-done.completed { background: #34c759; color: white; box-shadow: 0 8px 30px rgba(52,199,89,0.35); cursor: default; }
    .btn-done .icon { font-size: 40px; line-height: 1; }
    .btn-done .label { font-size: 18px; font-weight: 700; }
    .change-name { margin-top: 24px; background: none; border: none; color: #8e8e93; font-size: 14px; cursor: pointer; }
    .change-name:hover { color: #007aff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="name-section" id="nameSection">
      <h2>你好！</h2>
      <p>请输入你的名字</p>
      <input type="text" id="nameInput" placeholder="名字或编号" maxlength="20" />
      <button class="btn-confirm" onclick="confirmName()">确认</button>
    </div>
    <div class="done-section" id="doneSection">
      <p class="greeting">你好，<span id="displayName"></span></p>
      <button class="btn-done idle" id="doneBtn" onclick="markDone()">
        <span class="icon">✋</span>
        <span class="label">我做完了</span>
      </button>
      <button class="change-name" onclick="changeName()">不是我？换个名字</button>
    </div>
  </div>

  <script>
    const DB = "https://kankandajia-beae8-default-rtdb.firebaseio.com";
    let currentSession = null;
    let pollTimer = null;
    let myName = null;

    function sanitize(str) {
      return encodeURIComponent(str.replace(/[.#$\[\]\/]/g, "_"));
    }

    async function fbGet(path) {
      const r = await fetch(`${DB}/${path}.json`);
      return r.json();
    }

    async function fbSet(path, data) {
      await fetch(`${DB}/${path}.json`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
    }

    async function init() {
      const session = await fbGet("current_session");
      currentSession = session;
      myName = localStorage.getItem("kankandajia_name");
      if (myName) {
        showDone(myName);
      }
    }

    function confirmName() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) return;
      localStorage.setItem("kankandajia_name", name);
      myName = name;
      showDone(name);
    }

    function showDone(name) {
      document.getElementById("nameSection").style.display = "none";
      document.getElementById("doneSection").style.display = "block";
      document.getElementById("displayName").textContent = name;
      document.getElementById("doneBtn").className = "btn-done idle";
      document.getElementById("doneBtn").innerHTML = '<span class="icon">✋</span><span class="label">我做完了</span>';
      document.getElementById("doneBtn").onclick = markDone;
      // 注册加入（异步，不阻塞）
      const key = sanitize(name);
      fbGet(`sessions/${currentSession}/users/${key}`).then(existing => {
        if (!existing || !existing.done) {
          fbSet(`sessions/${currentSession}/users/${key}`, { done: false, name, ts: Date.now() });
        }
      });
      startPolling(name);
    }

    function startPolling(name) {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(() => pollState(name), 2000);
      pollState(name);
    }

    async function pollState(name) {
      // 检查 session 是否换了
      const session = await fbGet("current_session");
      if (session !== currentSession) {
        currentSession = session;
        // 新一轮，重新注册
        updateBtn(false);
        const key = sanitize(name);
        await fbSet(`sessions/${currentSession}/users/${key}`, { done: false, name, ts: Date.now() });
      }
      const key = sanitize(name);
      const data = await fbGet(`sessions/${currentSession}/users/${key}`);
      updateBtn(data && data.done === true);
    }

    async function markDone() {
      if (!myName || !currentSession) return;
      const key = sanitize(myName);
      await fbSet(`sessions/${currentSession}/users/${key}`, { done: true, name: myName, ts: Date.now() });
      updateBtn(true);
    }

    function changeName() {
      localStorage.removeItem("kankandajia_name");
      if (pollTimer) clearInterval(pollTimer);
      document.getElementById("doneSection").style.display = "none";
      document.getElementById("nameSection").style.display = "block";
      document.getElementById("nameInput").value = "";
    }

    function updateBtn(done) {
      const btn = document.getElementById("doneBtn");
      if (done) {
        btn.className = "btn-done completed";
        btn.innerHTML = '<span class="icon">✅</span><span class="label">已完成！</span>';
        btn.onclick = null;
      } else {
        btn.className = "btn-done idle";
        btn.innerHTML = '<span class="icon">✋</span><span class="label">我做完了</span>';
        btn.onclick = markDone;
      }
    }

    document.getElementById("nameInput").addEventListener("keydown", e => {
      if (e.key === "Enter") confirmName();
    });

    init();
  </script>
</body>
</html>
