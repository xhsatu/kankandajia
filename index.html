<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我做完了</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 340px;
      text-align: center;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }
    .name-section h2 {
      font-size: 22px;
      font-weight: 600;
      color: #1c1c1e;
      margin-bottom: 8px;
    }
    .name-section p {
      font-size: 15px;
      color: #8e8e93;
      margin-bottom: 24px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e5e5ea;
      border-radius: 12px;
      font-size: 17px;
      outline: none;
      transition: border-color 0.2s;
      color: #1c1c1e;
    }
    input:focus { border-color: #007aff; }
    .btn-confirm {
      margin-top: 16px;
      width: 100%;
      padding: 15px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-confirm:active { opacity: 0.75; }

    .done-section { display: none; }
    .done-section .greeting {
      font-size: 17px;
      color: #8e8e93;
      margin-bottom: 32px;
    }
    .done-section .greeting span {
      color: #1c1c1e;
      font-weight: 600;
    }
    .btn-done {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0 auto;
    }
    .btn-done.idle {
      background: #007aff;
      color: white;
      box-shadow: 0 8px 30px rgba(0,122,255,0.35);
    }
    .btn-done.idle:active { transform: scale(0.95); }
    .btn-done.completed {
      background: #34c759;
      color: white;
      box-shadow: 0 8px 30px rgba(52,199,89,0.35);
      cursor: default;
    }
    .btn-done .icon { font-size: 40px; line-height: 1; }
    .btn-done .label { font-size: 18px; font-weight: 700; }
    .change-name {
      margin-top: 24px;
      background: none;
      border: none;
      color: #8e8e93;
      font-size: 14px;
      cursor: pointer;
    }
    .change-name:hover { color: #007aff; }
  </style>
</head>
<body>
  <div class="card">
    <!-- 输入姓名 -->
    <div class="name-section" id="nameSection">
      <h2>你好！</h2>
      <p>请输入你的名字</p>
      <input type="text" id="nameInput" placeholder="名字或编号" maxlength="20" />
      <button class="btn-confirm" onclick="confirmName()">确认</button>
    </div>

    <!-- 签到按钮 -->
    <div class="done-section" id="doneSection">
      <p class="greeting">你好，<span id="displayName"></span></p>
      <button class="btn-done idle" id="doneBtn" onclick="markDone()">
        <span class="icon">✋</span>
        <span class="label">我做完了</span>
      </button>
      <button class="change-name" onclick="changeName()">不是我？换个名字</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAD4m-YPEM7sLCGMk97Tx5L1QRZlqTK7d8",
      authDomain: "kankandajia-beae8.firebaseapp.com",
      projectId: "kankandajia-beae8",
      storageBucket: "kankandajia-beae8.firebasestorage.app",
      messagingSenderId: "272852234229",
      appId: "1:272852234229:web:a40d576fbac1b8b880babc",
      databaseURL: "https://kankandajia-beae8-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window._db = db;
    window._ref = ref;
    window._set = set;
    window._onValue = onValue;

    // 自动跟随教师当前场次
    const sessionRef = ref(db, "current_session");
    onValue(sessionRef, (snap) => {
      const key = snap.val();
      if (key && key !== localStorage.getItem("kankandajia_session")) {
        localStorage.setItem("kankandajia_session", key);
        // 如果已在签到界面，重新绑定
        const name = localStorage.getItem("kankandajia_name");
        if (name && document.getElementById("doneSection").style.display !== "none") {
          showDoneSection(name);
        }
      }
    });

    const saved = localStorage.getItem("kankandajia_name");
    if (saved) showDoneSection(saved);
  </script>

  <script>
    function confirmName() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) return;
      localStorage.setItem("kankandajia_name", name);
      showDoneSection(name);
    }

    function showDoneSection(name) {
      document.getElementById("nameSection").style.display = "none";
      document.getElementById("doneSection").style.display = "block";
      document.getElementById("displayName").textContent = name;

      const sessionKey = getSessionKey();
      const userRef = window._ref(window._db, `sessions/${sessionKey}/users/${sanitize(name)}`);
      window._onValue(userRef, (snap) => {
        const done = snap.val()?.done === true;
        updateBtn(done);
      });
    }

    function markDone() {
      const name = localStorage.getItem("kankandajia_name");
      if (!name) return;
      const sessionKey = getSessionKey();
      const userRef = window._ref(window._db, `sessions/${sessionKey}/users/${sanitize(name)}`);
      window._set(userRef, { done: true, name: name, ts: Date.now() });
    }

    function changeName() {
      localStorage.removeItem("kankandajia_name");
      document.getElementById("doneSection").style.display = "none";
      document.getElementById("nameSection").style.display = "block";
      document.getElementById("nameInput").value = "";
    }

    function updateBtn(done) {
      const btn = document.getElementById("doneBtn");
      if (done) {
        btn.className = "btn-done completed";
        btn.innerHTML = '<span class="icon">✅</span><span class="label">已完成！</span>';
        btn.onclick = null;
      } else {
        btn.className = "btn-done idle";
        btn.innerHTML = '<span class="icon">✋</span><span class="label">我做完了</span>';
        btn.onclick = markDone;
      }
    }

    function getSessionKey() {
      return localStorage.getItem("kankandajia_session") || "default";
    }

    function sanitize(str) {
      return str.replace(/[.#$\[\]\/]/g, "_");
    }

    document.getElementById("nameInput").addEventListener("keydown", e => {
      if (e.key === "Enter") confirmName();
    });
  </script>
</body>
</html>
