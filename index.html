<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我做完了</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 340px;
      text-align: center;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }
    .name-section h2 { font-size: 22px; font-weight: 600; color: #1c1c1e; margin-bottom: 8px; }
    .name-section p { font-size: 15px; color: #8e8e93; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e5e5ea;
      border-radius: 12px;
      font-size: 17px;
      outline: none;
      transition: border-color 0.2s;
      color: #1c1c1e;
    }
    input:focus { border-color: #007aff; }
    .btn-confirm {
      margin-top: 16px;
      width: 100%;
      padding: 15px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-confirm:active { opacity: 0.75; }
    .done-section { display: none; }
    .done-section .greeting { font-size: 17px; color: #8e8e93; margin-bottom: 32px; }
    .done-section .greeting span { color: #1c1c1e; font-weight: 600; }
    .btn-done {
      width: 180px; height: 180px; border-radius: 50%; border: none;
      font-size: 20px; font-weight: 700; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; margin: 0 auto;
    }
    .btn-done.idle { background: #007aff; color: white; box-shadow: 0 8px 30px rgba(0,122,255,0.35); }
    .btn-done.idle:active { transform: scale(0.95); }
    .btn-done.completed { background: #34c759; color: white; box-shadow: 0 8px 30px rgba(52,199,89,0.35); cursor: default; }
    .btn-done .icon { font-size: 40px; line-height: 1; }
    .btn-done .label { font-size: 18px; font-weight: 700; }
    .change-name { margin-top: 24px; background: none; border: none; color: #8e8e93; font-size: 14px; cursor: pointer; }
    .change-name:hover { color: #007aff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="name-section" id="nameSection">
      <h2>你好！</h2>
      <p>请输入你的名字</p>
      <input type="text" id="nameInput" placeholder="名字或编号" maxlength="20" />
      <button class="btn-confirm" onclick="confirmName()">确认</button>
    </div>
    <div class="done-section" id="doneSection">
      <p class="greeting">你好，<span id="displayName"></span></p>
      <button class="btn-done idle" id="doneBtn" onclick="markDone()">
        <span class="icon">✋</span>
        <span class="label">我做完了</span>
      </button>
      <button class="change-name" onclick="changeName()">不是我？换个名字</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const app = initializeApp({
      apiKey: "AIzaSyAD4m-YPEM7sLCGMk97Tx5L1QRZlqTK7d8",
      authDomain: "kankandajia-beae8.firebaseapp.com",
      projectId: "kankandajia-beae8",
      storageBucket: "kankandajia-beae8.firebasestorage.app",
      messagingSenderId: "272852234229",
      appId: "1:272852234229:web:a40d576fbac1b8b880babc",
      databaseURL: "https://kankandajia-beae8-default-rtdb.firebaseio.com"
    });
    const db = getDatabase(app);

    let currentSession = null;
    let userListener = null;

    function sanitize(str) {
      return str.replace(/[.#$\[\]\/]/g, "_");
    }

    function updateBtn(done) {
      const btn = document.getElementById("doneBtn");
      if (done) {
        btn.className = "btn-done completed";
        btn.innerHTML = '<span class="icon">✅</span><span class="label">已完成！</span>';
        btn.onclick = null;
      } else {
        btn.className = "btn-done idle";
        btn.innerHTML = '<span class="icon">✋</span><span class="label">我做完了</span>';
        btn.onclick = window.markDone;
      }
    }

    function bindUser(name, session) {
      if (userListener) off(userListener);
      const userRef = ref(db, `sessions/${session}/users/${sanitize(name)}`);
      userListener = userRef;
      onValue(userRef, (snap) => {
        updateBtn(snap.val()?.done === true);
      });
    }

    // 监听教师 session，session 变化时重置按钮
    onValue(ref(db, "current_session"), (snap) => {
      const key = snap.val();
      if (!key) return;
      const prev = currentSession;
      currentSession = key;

      const name = localStorage.getItem("kankandajia_name");
      if (name && document.getElementById("doneSection").style.display !== "none") {
        if (prev && prev !== key) {
          // 新一轮，重置按钮
          updateBtn(false);
        }
        bindUser(name, key);
      }
    });

    window.confirmName = function() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) return;
      localStorage.setItem("kankandajia_name", name);
      showDone(name);
    };

    window.markDone = function() {
      const name = localStorage.getItem("kankandajia_name");
      if (!name || !currentSession) return;
      set(ref(db, `sessions/${currentSession}/users/${sanitize(name)}`), {
        done: true, name: name, ts: Date.now()
      });
    };

    window.changeName = function() {
      localStorage.removeItem("kankandajia_name");
      document.getElementById("doneSection").style.display = "none";
      document.getElementById("nameSection").style.display = "block";
      document.getElementById("nameInput").value = "";
    };

    function showDone(name) {
      document.getElementById("nameSection").style.display = "none";
      document.getElementById("doneSection").style.display = "block";
      document.getElementById("displayName").textContent = name;
      if (currentSession) bindUser(name, currentSession);
    }

    // 如果已有名字，等 session 加载后自动显示
    const saved = localStorage.getItem("kankandajia_name");
    if (saved) {
      // session 监听器会在收到 key 后调用 bindUser
      document.getElementById("nameSection").style.display = "none";
      document.getElementById("doneSection").style.display = "block";
      document.getElementById("displayName").textContent = saved;
    }

    document.getElementById("nameInput").addEventListener("keydown", e => {
      if (e.key === "Enter") window.confirmName();
    });
  </script>
</body>
</html>
