<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我做完了</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111113;
      --surface: #1a1a1d;
      --border: rgba(255,255,255,0.08);
      --text: #f5f5f7;
      --sub: rgba(245,245,247,0.38);
      --accent: #f5f5f7;
      --green: #34d170;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Instrument Sans', -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 320px;
      text-align: center;
      animation: up 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── NAME ── */
    .name-section h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .name-section p {
      font-size: 14px;
      color: var(--sub);
      margin-bottom: 32px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: rgba(245,245,247,0.2); }
    input:focus { border-color: rgba(245,245,247,0.25); }

    .btn-confirm {
      margin-top: 10px;
      width: 100%;
      padding: 13px;
      background: var(--text);
      color: #111113;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-confirm:hover { opacity: 0.88; }
    .btn-confirm:active { opacity: 0.7; }

    /* ── DONE ── */
    .done-section { display: none; }

    .greeting {
      font-size: 14px;
      color: var(--sub);
      margin-bottom: 48px;
    }
    .greeting strong { color: var(--text); font-weight: 600; }

    .btn-done {
      width: 176px; height: 176px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      margin: 0 auto;
      transition: border-color 0.2s, transform 0.15s, background 0.3s;
    }
    .btn-done.idle:hover {
      border-color: rgba(245,245,247,0.22);
      transform: scale(1.03);
    }
    .btn-done.idle:active { transform: scale(0.97); }

    .btn-done.completed {
      border-color: rgba(52,209,112,0.35);
      background: rgba(52,209,112,0.07);
      cursor: default;
      transform: scale(1);
    }

    .btn-done .icon { font-size: 38px; line-height: 1; }
    .btn-done .label {
      font-size: 15px;
      font-weight: 600;
      color: var(--sub);
      letter-spacing: -0.1px;
    }
    .btn-done.idle .label { color: var(--text); }
    .btn-done.completed .label { color: var(--green); }

    .change-name {
      margin-top: 28px;
      background: none;
      border: none;
      color: rgba(245,245,247,0.22);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.15s;
    }
    .change-name:hover { color: var(--sub); }

    #sessionLabel {
      margin-top: 12px;
      font-size: 11px;
      color: rgba(245,245,247,0.12);
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="name-section" id="nameSection">
      <h2>你好</h2>
      <p>请输入你的名字</p>
      <input type="text" id="nameInput" placeholder="名字或编号" maxlength="20" />
      <button class="btn-confirm" onclick="confirmName()">确认</button>
    </div>
    <div class="done-section" id="doneSection">
      <p class="greeting">你好，<strong id="displayName"></strong></p>
      <button class="btn-done idle" id="doneBtn" onclick="markDone()">
        <span class="icon">✋</span>
        <span class="label">我做完了</span>
      </button>
      <button class="change-name" onclick="changeName()">不是我？换个名字</button>
      <p id="sessionLabel"></p>
    </div>
  </div>

  <script>
    const DB = "https://kankandajia-beae8-default-rtdb.firebaseio.com";
    let currentSession = null;
    let pollTimer = null;
    let myName = null;
    let localDone = false;

    function sanitize(str) { return str.replace(/[.#$\[\]\/]/g, "_"); }

    async function fbGet(path) {
      const r = await fetch(`${DB}/${path}.json`);
      return r.json();
    }
    async function fbSet(path, data) {
      await fetch(`${DB}/${path}.json`, {
        method: "PUT", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
    }

    async function init() {
      const session = await fbGet("current_session");
      currentSession = session;
      myName = localStorage.getItem("kankandajia_name");
      if (myName) showDone(myName);
    }

    function confirmName() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) return;
      localStorage.setItem("kankandajia_name", name);
      myName = name;
      showDone(name);
    }

    function showDone(name) {
      document.getElementById("nameSection").style.display = "none";
      document.getElementById("doneSection").style.display = "block";
      document.getElementById("displayName").textContent = name;
      document.getElementById("doneBtn").className = "btn-done idle";
      document.getElementById("doneBtn").innerHTML = '<span class="icon">✋</span><span class="label">我做完了</span>';
      document.getElementById("doneBtn").onclick = markDone;
      localDone = false;
      fbSet(`sessions/${currentSession}/users/${sanitize(name)}`, { done: false, name, ts: Date.now() });
      startPolling(name);
    }

    function startPolling(name) {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(() => pollState(name), 2000);
      pollState(name);
    }

    async function pollState(name) {
      const session = await fbGet("current_session");
      if (session !== currentSession) {
        currentSession = session;
        localDone = false;
        updateBtn(false);
        await fbSet(`sessions/${currentSession}/users/${sanitize(name)}`, { done: false, name, ts: Date.now() });
      }
      if (!localDone) {
        const data = await fbGet(`sessions/${currentSession}/users/${sanitize(name)}`);
        updateBtn(data && data.done === true);
      }
      const lbl = document.getElementById("sessionLabel");
      if (lbl) lbl.textContent = "轮次 " + currentSession;
    }

    async function markDone() {
      if (!myName || !currentSession) return;
      localDone = true;
      updateBtn(true);
      fbSet(`sessions/${currentSession}/users/${sanitize(myName)}`, { done: true, name: myName, ts: Date.now() });
    }

    function changeName() {
      if (myName && currentSession) fbSet(`sessions/${currentSession}/users/${sanitize(myName)}`, null);
      localStorage.removeItem("kankandajia_name");
      myName = null;
      if (pollTimer) clearInterval(pollTimer);
      document.getElementById("doneSection").style.display = "none";
      document.getElementById("nameSection").style.display = "block";
      document.getElementById("nameInput").value = "";
    }

    function updateBtn(done) {
      const btn = document.getElementById("doneBtn");
      if (done) {
        btn.className = "btn-done completed";
        btn.innerHTML = '<span class="icon">✅</span><span class="label">已完成</span>';
        btn.onclick = null;
      } else {
        btn.className = "btn-done idle";
        btn.innerHTML = '<span class="icon">✋</span><span class="label">我做完了</span>';
        btn.onclick = markDone;
      }
    }

    document.getElementById("nameInput").addEventListener("keydown", e => {
      if (e.key === "Enter") confirmName();
    });

    init();
  </script>
</body>
</html>
